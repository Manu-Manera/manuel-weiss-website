<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI Coach – Dein persönlicher Begleiter | Manuel Weiss</title>
    <meta name="description" content="Dein persönlicher KI-Coach für Ziele, Gewohnheiten, Stress, Achtsamkeit und persönliche Entwicklung. Chat-basiert, jederzeit verfügbar.">

    <link rel="icon" type="image/svg+xml" href="manuel-weiss-photo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --acc: #6366f1;
            --acc-2: #8b5cf6;
            --acc-soft: rgba(99, 102, 241, .1);
            --bg: #f6f7fb;
            --card: #ffffff;
            --text: #1e2233;
            --muted: #6b7280;
            --line: #e6e8f0;
            --user-bubble: linear-gradient(135deg, #6366f1, #8b5cf6);
            --shadow: 0 10px 40px rgba(30, 34, 51, .08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { height: 100%; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ---------- Header ---------- */
        .coach-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px clamp(16px, 4vw, 32px);
            background: var(--card);
            border-bottom: 1px solid var(--line);
            flex-shrink: 0;
            z-index: 5;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            color: var(--muted);
            text-decoration: none;
            background: var(--bg);
            transition: .2s;
            flex-shrink: 0;
        }
        .back-link:hover { background: var(--acc-soft); color: var(--acc); }

        .coach-id { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }

        .coach-avatar {
            width: 44px; height: 44px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--acc), var(--acc-2));
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 20px;
            flex-shrink: 0;
            box-shadow: 0 6px 18px rgba(99, 102, 241, .35);
        }

        .coach-title h1 { font-size: 17px; font-weight: 700; line-height: 1.2; }
        .coach-title .status {
            font-size: 12.5px; color: #16a34a; font-weight: 500;
            display: flex; align-items: center; gap: 6px;
        }
        .coach-title .status::before {
            content: ''; width: 7px; height: 7px; border-radius: 50%;
            background: #16a34a; box-shadow: 0 0 0 3px rgba(22, 163, 74, .18);
        }
        .coach-title .status.offline { color: var(--muted); }
        .coach-title .status.offline::before { background: var(--muted); box-shadow: none; }

        .header-btn {
            border: 1px solid var(--line);
            background: var(--card);
            color: var(--muted);
            border-radius: 10px;
            padding: 9px 14px;
            font-size: 13px; font-weight: 600;
            cursor: pointer;
            display: inline-flex; align-items: center; gap: 7px;
            transition: .2s;
            font-family: inherit;
        }
        .header-btn:hover { border-color: var(--acc); color: var(--acc); }
        .header-btn span { display: inline; }
        @media (max-width: 560px) { .header-btn span { display: none; } }

        /* ---------- Chat ---------- */
        .chat-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 24px clamp(12px, 4vw, 32px);
            scroll-behavior: smooth;
        }
        .chat-inner { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 18px; }

        .msg { display: flex; gap: 12px; align-items: flex-start; animation: rise .35s ease; }
        @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

        .msg .av {
            width: 34px; height: 34px; border-radius: 11px;
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            font-size: 15px;
        }
        .msg.bot .av { background: linear-gradient(135deg, var(--acc), var(--acc-2)); color: #fff; }
        .msg.user { flex-direction: row-reverse; }
        .msg.user .av { background: #1e2233; color: #fff; }

        .bubble {
            max-width: min(80%, 560px);
            padding: 13px 16px;
            border-radius: 16px;
            font-size: 15px; line-height: 1.6;
            box-shadow: 0 2px 8px rgba(30, 34, 51, .05);
            word-wrap: break-word;
            overflow-wrap: anywhere;
        }
        .msg.bot .bubble { background: var(--card); border: 1px solid var(--line); border-top-left-radius: 5px; }
        .msg.user .bubble { background: var(--user-bubble); color: #fff; border-top-right-radius: 5px; box-shadow: 0 6px 18px rgba(99, 102, 241, .3); }

        .bubble p { margin: 0 0 9px; } .bubble p:last-child { margin-bottom: 0; }
        .bubble strong { font-weight: 700; }
        .bubble ul, .bubble ol { margin: 6px 0 9px; padding-left: 20px; }
        .bubble li { margin-bottom: 4px; }
        .bubble code { background: var(--acc-soft); padding: 1px 6px; border-radius: 6px; font-size: 13.5px; }

        /* Typing */
        .typing { display: inline-flex; gap: 5px; padding: 4px 2px; }
        .typing i { width: 8px; height: 8px; border-radius: 50%; background: var(--acc); opacity: .4; animation: blink 1.2s infinite; }
        .typing i:nth-child(2) { animation-delay: .2s; }
        .typing i:nth-child(3) { animation-delay: .4s; }
        @keyframes blink { 0%, 60%, 100% { opacity: .25; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }

        /* ---------- Welcome / quick prompts ---------- */
        .welcome { text-align: center; padding: 24px 8px 8px; }
        .welcome .hero-ic {
            width: 64px; height: 64px; margin: 0 auto 16px;
            border-radius: 20px; background: linear-gradient(135deg, var(--acc), var(--acc-2));
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 28px; box-shadow: 0 12px 30px rgba(99, 102, 241, .4);
        }
        .welcome h2 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
        .welcome p { color: var(--muted); font-size: 14.5px; max-width: 460px; margin: 0 auto 20px; line-height: 1.6; }

        .chips { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 600px; margin: 0 auto; }
        .chip {
            background: var(--card); border: 1px solid var(--line);
            border-radius: 14px; padding: 12px 16px;
            font-size: 13.5px; font-weight: 500; color: var(--text);
            cursor: pointer; transition: .2s; text-align: left;
            display: flex; align-items: center; gap: 9px;
        }
        .chip i { color: var(--acc); font-size: 14px; }
        .chip:hover { border-color: var(--acc); transform: translateY(-2px); box-shadow: var(--shadow); }

        /* ---------- Composer ---------- */
        .composer-wrap { flex-shrink: 0; background: var(--card); border-top: 1px solid var(--line); padding: 14px clamp(12px, 4vw, 32px) calc(14px + env(safe-area-inset-bottom)); }
        .composer { max-width: 760px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
        .composer textarea {
            flex: 1; resize: none; border: 1.5px solid var(--line); border-radius: 16px;
            padding: 13px 16px; font-family: inherit; font-size: 15px; line-height: 1.5;
            max-height: 160px; background: var(--bg); color: var(--text); transition: .2s;
        }
        .composer textarea:focus { outline: none; border-color: var(--acc); background: var(--card); box-shadow: 0 0 0 4px var(--acc-soft); }
        .send-btn {
            width: 48px; height: 48px; border: none; border-radius: 14px; flex-shrink: 0;
            background: linear-gradient(135deg, var(--acc), var(--acc-2)); color: #fff;
            font-size: 17px; cursor: pointer; transition: .2s;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 18px rgba(99, 102, 241, .35);
        }
        .send-btn:hover:not(:disabled) { transform: translateY(-2px); }
        .send-btn:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; }
        .composer-hint { max-width: 760px; margin: 8px auto 0; font-size: 11.5px; color: var(--muted); text-align: center; }

        .banner {
            max-width: 760px; margin: 0 auto 4px;
            background: #fff7ed; border: 1px solid #fed7aa; color: #9a3412;
            border-radius: 12px; padding: 11px 14px; font-size: 13px; line-height: 1.5;
            display: none;
        }
        .banner.show { display: block; }
        .banner a { color: #9a3412; font-weight: 700; }
    </style>
</head>
<body>
    <header class="coach-header">
        <a href="aktivitaeten-uebersicht.html" class="back-link" id="backLink" title="Zurück">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div class="coach-id">
            <div class="coach-avatar"><i class="fas fa-compass"></i></div>
            <div class="coach-title">
                <h1>AI Coach</h1>
                <div class="status" id="statusPill">Verfügbar</div>
            </div>
        </div>
        <button class="header-btn" id="resetBtn" title="Neues Gespräch beginnen">
            <i class="fas fa-rotate-right"></i><span>Neues Gespräch</span>
        </button>
    </header>

    <main class="chat-scroll" id="chatScroll">
        <div class="chat-inner" id="chatInner">
            <div class="welcome" id="welcome">
                <div class="hero-ic"><i class="fas fa-compass"></i></div>
                <h2>Hallo! Ich bin dein Coach.</h2>
                <p>Ich begleite dich bei Zielen, Gewohnheiten, Stress, Achtsamkeit und persönlicher Entwicklung – Schritt für Schritt. Womit kann ich dir heute helfen?</p>
                <div class="chips" id="chips">
                    <button class="chip" data-prompt="Ich möchte ein konkretes Ziel für die nächsten 4 Wochen setzen. Hilf mir dabei."><i class="fas fa-bullseye"></i> Ein Ziel setzen</button>
                    <button class="chip" data-prompt="Ich fühle mich gerade gestresst und überfordert. Hilf mir, das zu sortieren."><i class="fas fa-leaf"></i> Stress sortieren</button>
                    <button class="chip" data-prompt="Ich möchte eine neue Gewohnheit aufbauen, die wirklich hält. Wie gehe ich vor?"><i class="fas fa-repeat"></i> Gewohnheit aufbauen</button>
                    <button class="chip" data-prompt="Lass uns eine kurze Reflexion über meinen Tag machen."><i class="fas fa-feather"></i> Tagesreflexion</button>
                </div>
            </div>
        </div>
    </main>

    <div class="composer-wrap">
        <div class="banner" id="banner"></div>
        <div class="composer">
            <textarea id="input" rows="1" placeholder="Schreib mir, was dich beschäftigt …" autocomplete="off"></textarea>
            <button class="send-btn" id="sendBtn" title="Senden"><i class="fas fa-paper-plane"></i></button>
        </div>
        <div class="composer-hint">Der Coach gibt Orientierung und ersetzt keine medizinische oder therapeutische Beratung.</div>
    </div>

    <!-- AWS Config + API Settings (globaler OpenAI-Key aus dem Admin-Panel) -->
    <script src="js/aws-app-config.js"></script>
    <script src="js/aws-api-settings.js"></script>

    <script>
    (function () {
        'use strict';

        // Reihenfolge = Fallback-Kette. Im Admin-Panel konfiguriertes Modell zuerst.
        const MODELS = ['gpt-5.2', 'gpt-4.1'];
        const STORE_KEY = 'aiCoachConversation_v1';
        const MAX_HISTORY = 24; // gesendete Nachrichten (ohne System)

        const SYSTEM_PROMPT = [
            'Du bist „AI Coach", ein einfühlsamer, strukturierter Coach für persönliche Entwicklung auf der Website von Manuel Weiss.',
            'Sprache: immer Deutsch, per Du, warm, ermutigend, konkret und auf den Punkt.',
            'Arbeitsweise: Stelle möglichst nur EINE Frage pro Nachricht, höre aktiv zu, fasse kurz zusammen und leite zu kleinen, machbaren nächsten Schritten.',
            'Nutze bewährte Methoden, wenn sie passen: GROW-Modell für Ziele, Tiny Habits / Gewohnheits-Stacking für Routinen, Eisenhower-Matrix für Prioritäten, 4-7-8-Atmung & Einfluss/Akzeptanz für Stress, Werte- und Stärkenarbeit, Wheel of Life für Standortbestimmung.',
            'Halte Antworten kurz (in der Regel 2–6 Sätze oder eine kompakte Liste). Vermeide Vorträge.',
            'Sei ehrlich: Wenn etwas professionelle Hilfe braucht (akute Krise, Suizidgedanken, schwere psychische Belastung), ermutige freundlich, professionelle Unterstützung zu suchen, und weise auf Notrufnummern (z. B. 112 / Telefonseelsorge 0800 111 0 111) hin.',
            'Du gibst keine medizinischen Diagnosen und keine Rechts- oder Finanzberatung.'
        ].join(' ');

        let cachedKey = null;
        let busy = false;
        let history = []; // [{role, content}]

        const els = {
            scroll: document.getElementById('chatScroll'),
            inner: document.getElementById('chatInner'),
            welcome: document.getElementById('welcome'),
            input: document.getElementById('input'),
            send: document.getElementById('sendBtn'),
            reset: document.getElementById('resetBtn'),
            banner: document.getElementById('banner'),
            status: document.getElementById('statusPill'),
            back: document.getElementById('backLink')
        };

        // --- Kontextbezogener Zurück-Link ---
        try {
            const ref = document.referrer;
            if (ref && ref.includes('persoenlichkeitsentwicklung-uebersicht')) {
                els.back.setAttribute('href', 'persoenlichkeitsentwicklung-uebersicht.html');
            }
        } catch (e) {}

        // --- Helpers ---
        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // Minimales Markdown → HTML (fett, listen, absätze)
        function renderMarkdown(text) {
            const lines = escapeHtml(text).split('\n');
            let html = '';
            let listType = null;
            const closeList = () => { if (listType) { html += `</${listType}>`; listType = null; } };

            for (let raw of lines) {
                let line = raw.trim();
                if (!line) { closeList(); continue; }

                const ul = line.match(/^[-*•]\s+(.*)$/);
                const ol = line.match(/^\d+[.)]\s+(.*)$/);
                let content = line;
                if (ul) { if (listType !== 'ul') { closeList(); html += '<ul>'; listType = 'ul'; } content = ul[1]; }
                else if (ol) { if (listType !== 'ol') { closeList(); html += '<ol>'; listType = 'ol'; } content = ol[1]; }
                else { closeList(); }

                content = content
                    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                    .replace(/`(.+?)`/g, '<code>$1</code>');

                html += (ul || ol) ? `<li>${content}</li>` : `<p>${content}</p>`;
            }
            closeList();
            return html || `<p>${escapeHtml(text)}</p>`;
        }

        function scrollDown() {
            requestAnimationFrame(() => { els.scroll.scrollTop = els.scroll.scrollHeight; });
        }

        function hideWelcome() {
            if (els.welcome) { els.welcome.remove(); }
        }

        function addMessage(role, text) {
            const msg = document.createElement('div');
            msg.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
            const icon = role === 'user' ? 'fa-user' : 'fa-compass';
            const body = role === 'assistant' ? renderMarkdown(text) : `<p>${escapeHtml(text).replace(/\n/g, '<br>')}</p>`;
            msg.innerHTML = `<div class="av"><i class="fas ${icon}"></i></div><div class="bubble">${body}</div>`;
            els.inner.appendChild(msg);
            scrollDown();
            return msg;
        }

        function showTyping() {
            const msg = document.createElement('div');
            msg.className = 'msg bot';
            msg.id = 'typingMsg';
            msg.innerHTML = '<div class="av"><i class="fas fa-compass"></i></div><div class="bubble"><span class="typing"><i></i><i></i><i></i></span></div>';
            els.inner.appendChild(msg);
            scrollDown();
        }
        function hideTyping() { const t = document.getElementById('typingMsg'); if (t) t.remove(); }

        function showBanner(html) { els.banner.innerHTML = html; els.banner.classList.add('show'); }
        function setStatus(online, label) {
            els.status.textContent = label;
            els.status.classList.toggle('offline', !online);
        }

        // --- Persistenz ---
        function save() {
            try { localStorage.setItem(STORE_KEY, JSON.stringify(history.slice(-MAX_HISTORY))); } catch (e) {}
        }
        function load() {
            try {
                const raw = localStorage.getItem(STORE_KEY);
                if (!raw) return;
                const arr = JSON.parse(raw);
                if (Array.isArray(arr) && arr.length) {
                    history = arr;
                    hideWelcome();
                    arr.forEach(m => addMessage(m.role, m.content));
                }
            } catch (e) {}
        }

        // --- API Key ---
        async function getKey() {
            if (cachedKey) return cachedKey;
            if (!window.awsAPISettings || typeof window.awsAPISettings.getFullApiKey !== 'function') {
                throw new Error('CONFIG');
            }
            const key = await window.awsAPISettings.getFullApiKey('openai', true);
            if (!key || typeof key !== 'string' || !key.startsWith('sk-')) throw new Error('NOKEY');
            cachedKey = key;
            return key;
        }

        // --- OpenAI Call mit Modell-Fallback ---
        function buildBody(model, messages) {
            const body = { model, messages, max_completion_tokens: 1200 };
            // GPT-5-Modelle akzeptieren nur die Standard-Temperatur → nicht setzen.
            if (!/^gpt-5/.test(model)) body.temperature = 0.7;
            return body;
        }

        async function callOpenAI(messages) {
            const key = await getKey();
            let lastErr = null;
            for (const model of MODELS) {
                try {
                    const res = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                        body: JSON.stringify(buildBody(model, messages))
                    });
                    if (res.ok) {
                        const data = await res.json();
                        const content = data.choices?.[0]?.message?.content?.trim();
                        if (content) return content;
                        lastErr = new Error('Leere Antwort'); continue; // nächstes Modell versuchen
                    }
                    const err = await res.json().catch(() => ({}));
                    const code = err.error?.code || '';
                    const m = (err.error?.message || '').toLowerCase();
                    // Auth-Fehler → Key invalidieren, sofort melden
                    if (res.status === 401) { cachedKey = null; throw new Error('AUTH'); }
                    // Modell-/Zugriffs-/Parameter-Probleme → nächstes Modell versuchen
                    if (res.status === 404 || code === 'model_not_found' || m.includes('model') || m.includes('does not have access') || m.includes('parameter')) {
                        lastErr = new Error(err.error?.message || 'Modellfehler'); continue;
                    }
                    throw new Error(err.error?.message || ('HTTP ' + res.status));
                } catch (e) {
                    if (e.message === 'AUTH') throw e;
                    lastErr = e;
                }
            }
            throw new Error((lastErr && lastErr.message) || 'Anfrage fehlgeschlagen');
        }

        // --- Senden ---
        async function send(text) {
            if (busy) return;
            text = (text || '').trim();
            if (!text) return;

            busy = true;
            els.send.disabled = true;
            hideWelcome();
            addMessage('user', text);
            history.push({ role: 'user', content: text });
            els.input.value = '';
            autoGrow();
            showTyping();

            const messages = [{ role: 'system', content: SYSTEM_PROMPT }, ...history.slice(-MAX_HISTORY)];

            try {
                const reply = await callOpenAI(messages);
                hideTyping();
                addMessage('assistant', reply);
                history.push({ role: 'assistant', content: reply });
                save();
                setStatus(true, 'Verfügbar');
            } catch (e) {
                hideTyping();
                history.pop(); // letzte User-Nachricht aus Verlauf nehmen, damit erneut gesendet werden kann
                if (e.message === 'CONFIG') {
                    setStatus(false, 'Nicht konfiguriert');
                    showBanner('⚙️ Der AI-Coach ist noch nicht eingerichtet (API-Konfiguration fehlt).');
                } else if (e.message === 'NOKEY') {
                    setStatus(false, 'Nicht konfiguriert');
                    showBanner('🔑 Es ist noch kein OpenAI-Key hinterlegt. Bitte im <a href="admin/sections/api-keys.html">Admin-Panel → API-Keys</a> einen Key speichern.');
                } else if (e.message === 'AUTH') {
                    setStatus(false, 'Key ungültig');
                    showBanner('🔑 Der hinterlegte OpenAI-Key ist ungültig oder abgelaufen. Bitte im <a href="admin/sections/api-keys.html">Admin-Panel → API-Keys</a> aktualisieren.');
                } else {
                    addMessage('assistant', 'Entschuldige, da ist gerade etwas schiefgelaufen: ' + e.message + '\n\nVersuch es bitte gleich noch einmal.');
                }
            } finally {
                busy = false;
                els.send.disabled = false;
                els.input.focus();
            }
        }

        // --- UI Events ---
        function autoGrow() {
            els.input.style.height = 'auto';
            els.input.style.height = Math.min(els.input.scrollHeight, 160) + 'px';
        }
        els.input.addEventListener('input', autoGrow);
        els.input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(els.input.value); }
        });
        els.send.addEventListener('click', () => send(els.input.value));

        document.getElementById('chips').addEventListener('click', (e) => {
            const chip = e.target.closest('.chip');
            if (chip) send(chip.dataset.prompt);
        });

        els.reset.addEventListener('click', () => {
            if (history.length && !confirm('Aktuelles Gespräch verwerfen und neu beginnen?')) return;
            history = [];
            try { localStorage.removeItem(STORE_KEY); } catch (e) {}
            location.reload();
        });

        // --- Init ---
        load();
        // Key im Hintergrund vorab prüfen, damit Status korrekt ist
        getKey().then(() => setStatus(true, 'Verfügbar')).catch((e) => {
            if (e.message === 'NOKEY' || e.message === 'CONFIG') setStatus(false, 'Nicht konfiguriert');
        });
        els.input.focus();
    })();
    </script>
</body>
</html>
