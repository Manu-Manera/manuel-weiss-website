<div class="finanzen-section">

        </div>
        <div class="fin-header-actions">
            <span id="fin-save-status" class="fin-save-status" aria-live="polite"></span>
            <button class="btn btn-outline" id="fin-reload-btn" title="Neu laden">

    <nav class="fin-tabs" role="tablist">

        <button class="fin-tab" data-fintab="portfolio"><i class="fas fa-chart-line"></i> Portfolio</button>
        <button class="fin-tab" data-fintab="goals"><i class="fas fa-bullseye"></i> Sparziele</button>
        <button class="fin-tab" data-fintab="coach"><i class="fas fa-user-tie"></i> Coach</button>
    </nav>

    <div class="fin-panes">
        <section id="fintab-overview" class="fin-pane" role="tabpanel"></section>
        <section id="fintab-cashflow" class="fin-pane" role="tabpanel" hidden></section>
        <section id="fintab-transactions" class="fin-pane" role="tabpanel" hidden></section>
        <section id="fintab-debts" class="fin-pane" role="tabpanel" hidden></section>
        <section id="fintab-portfolio" class="fin-pane" role="tabpanel" hidden></section>
        <section id="fintab-goals" class="fin-pane" role="tabpanel" hidden></section>
